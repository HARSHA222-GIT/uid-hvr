<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: rgb(142, 193, 196);
            margin: 0;
            padding: 20px;
        }

        /* The container that holds the cards */
        .container {
            display: flex; /* This turns on the flexbox magic */
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            background-color: rgb(165, 217, 217);
            padding: 20px;
        }

        /* The individual cards */
        .card {
            width: 300px; /* Use width instead of size */
            background-color: rgb(195, 205, 197);
            padding: 20px;
            border-radius: 10px; /* Softens the corners */
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .image {
         width: 100%; /* Makes image fit the card width */
          height: auto; ; border-radius: 5px;  
          }
        

        .button {
            cursor: pointer;
            background-color: white;
            border: 1px solid #ccc;
            padding: 10px 20px;
            margin-top: 10px;
            transition: 0.3s;
        }

        .button:hover {
            background-color: #ddd;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <img class="image" src="Amaravati-Campus_edited.jpg" alt="University Campus">
            <h3>Amrita Amaravati</h3>
            <p>Deemed to be University</p>
            <button class="button">Learn more</button>
        </div>

        <div class="card">
        
             <img  class="image" src="amritpuri.jpg" alt="University Campus">
            <h3>Amrita amritpuri</h3>
            <p>Deemed to be University</p>
            <button class="button">Learn more</button>
        </div>

        <div class="card">
            <img class="image" src="cbe.jpg" alt="University Campus">
            <h3>Amrita Coimbatore</h3>
            <p>Deemed to be University</p>
            <button class="button">Learn more</button>
        </div>
    </div>

</body>
</html>

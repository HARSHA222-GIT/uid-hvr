<!DOCTYPE html>
<html>
    <body style="background-color:rgb(197, 231, 233); text-align: center;">
        <h1>STUDENT APPLICATION FORM</h1>
        <table border="1" align="center">
              <tr>
                <td><label for="fname">full name:</label></td>
                <td><input id="fname" type="text" name="full name"></td>
              </tr>
              <tr>
              <td><label for="mail">email</label></td>
              <td><input id="mail" type="text" name="email"></td>
              </tr> 
              <tr>
              <td><label for="num">phone number</label></td>
              <td><input id="num" type="number" name="ph num"></td>
              </tr>
              <tr>
                <td><label for="gender">Gender</label></td>
                <td><input id="gender" type="radio" value="male">male
                <input id="gender" type="radio" value="female">female
                 <input id="gender" type="radio" value="other">other</td>
              </tr> 
              <tr>
                <td><label for="courses">courses applying for</label></td>
                <td><select name="courses" id="courses">
                  <option value="">B.Tech</option>
                <option value="AI&DS">AI&DS</option>
                <option value="AI">AI</option>
                <option value="CSE">CSE</option></td></select>
              </tr>
              <tr>
                <td><label for="Hobbies">Hobbies</label></td>
                <td><input  id="gender" type="checkbox" value="music">music
                <input id="gender" type="checkbox" value="sports">sports
                 <input id="gender" type="checkbox" value="reading">reading</td>
              </tr>
              <tr>
                <td><label for="dob">Date of Birth</label></td>
                <td><input type="date" name="birth date" id="dob"></td>
              </tr>
              <tr>
                <td><label for="docs">upload certificates</label></td>
                <td><input type="file" name="certs" id="docs"></td>
              </tr>
              <tr>
                <td><label for="address">Address</label></td>
                <td><textarea name="address" id="address"></textarea></td>
              </tr>
              <tr>
                <td colspan="2" style="text-align: center;"><input type="button" value="SUBMIT" > 
                <input type="button" value="RESET"></td>

              </tr>
        </table>
    </body>
</html>

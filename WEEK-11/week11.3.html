<html>
    <head>
       <title>Strength of a password</title>
      <style>
            body {
            font-family: Arial;
            text-align: center;
            background-color: #f0f8ff;
            }

            h2 {
                color: #333;
            }

            input {
                padding: 10px;
                width: 200px;
                margin: 5px;
                border: 2px solid #555;
                border-radius: 5px;
            }

            button {
                padding: 10px 20px;
                background-color: #2196F3;
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
            }

            button:hover {
                background-color: #1976D2;
            }
        </style>

    </head>
    <body>
        <h1>Enter your credentials</h1>

        <input type="text" id="password" placeholder="Password"><br><br>
        <button onclick="validatePassword()">Submit</button>

        <div id="result"></div>

        <script>
            function validatePassword() {
                var password = document.getElementById("password").value;
                var passwordformat = /[a-zA-Z0-9._%+-]/;
                if (password.match(passwordformat)) {
                    document.getElementById("result").innerHTML = "Password is valid.";
                } else {
                    document.getElementById("result").innerHTML = "Password is not valid.";
                }
            }
        </script>
    </body>
</html>

  <!DOCTYPE html>
<html>
<head>
    <title>Sort Numbers</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f0f8ff;
        }

        h2 {
            color: #333;
        }

        input {
            padding: 10px;
            width: 200px;
            margin: 5px;
            border: 2px solid #555;
            border-radius: 5px;
        }

        button {
            padding: 10px 20px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1976D2;
        }
    </style>
</head>

<body>

<h2>Sort Three Numbers (Highest to Lowest)</h2>

<input type="number" id="num1" placeholder="First number"><br>
<input type="number" id="num2" placeholder="Second number"><br>
<input type="number" id="num3" placeholder="Third number"><br><br>

<button onclick="sortNumbers()">Sort</button>

<script>
function sortNumbers()
{
    let a = Number(document.getElementById("num1").value);
    let b = Number(document.getElementById("num2").value);
    let c = Number(document.getElementById("num3").value);

    let numbers = [a, b, c];

    numbers.sort(function(x, y) {
        return y - x; // descending order
    });

    alert("Sorted order (Highest to Lowest): " + numbers.join(", "));
}
</script>

</body>
</html>

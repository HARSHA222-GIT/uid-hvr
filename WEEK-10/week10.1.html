  <!DOCTYPE html>
<html>
<head>
    <title>Sign of Product</title>
     <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f0f8ff;
        }

        h2 {
            color: #333;
        }

        input {
            padding: 10px;
            width: 200px;
            margin: 5px;
            border: 2px solid #555;
            border-radius: 5px;
        }

        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

<h2>Enter Three Numbers</h2>

<input type="number" id="num1" placeholder="First number"><br><br>
<input type="number" id="num2" placeholder="Second number"><br><br>
<input type="number" id="num3" placeholder="Third number"><br><br>

<button onclick="findSign()">Check Sign</button>

<script>
function findSign()
{
    let a = Number(document.getElementById("num1").value);
    let b = Number(document.getElementById("num2").value);
    let c = Number(document.getElementById("num3").value);

    let product = a * b * c;

    if(product > 0)
    {
        alert("The sign is + (Positive)");
    }
    else if(product < 0)
    {
        alert("The sign is - (Negative)");
    }
    else
    {
        alert("The sign is 0 (Zero)");
    }
}
</script>

</body>
</html>

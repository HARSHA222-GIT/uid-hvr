  <!DOCTYPE html>
<html>
<head>
    <title>Find Largest Number</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f0f8ff;
        }

        h2 {
            color: #333;
        }

        input {
            padding: 10px;
            width: 200px;
            margin: 5px;
            border: 2px solid #555;
            border-radius: 5px;
        }

        button {
            padding: 10px 20px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1976D2;
        }
    </style>
<body>

<h2>Find Largest of Five Numbers</h2>

<input type="number" id="num1" placeholder="Enter number 1"><br><br>
<input type="number" id="num2" placeholder="Enter number 2"><br><br>
<input type="number" id="num3" placeholder="Enter number 3"><br><br>
<input type="number" id="num4" placeholder="Enter number 4"><br><br>
<input type="number" id="num5" placeholder="Enter number 5"><br><br>

<button onclick="findLargest()">Find Largest</button>

<script>
function findLargest()
{
    let a = Number(document.getElementById("num1").value);
    let b = Number(document.getElementById("num2").value);
    let c = Number(document.getElementById("num3").value);
    let d = Number(document.getElementById("num4").value);
    let e = Number(document.getElementById("num5").value);

    let largest;

    if(a >= b && a >= c && a >= d && a >= e)
    {
        largest = a;
    }
    else if(b >= a && b >= c && b >= d && b >= e)
    {
        largest = b;
    }
    else if(c >= a && c >= b && c >= d && c >= e)
    {
        largest = c;
    }
    else if(d >= a && d >= b && d >= c && d >= e)
    {
        largest = d;
    }
    else
    {
        largest = e;
    }

    alert("The largest number is: " + largest);
}
</script>

</body>
</html>

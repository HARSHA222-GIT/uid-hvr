<!DOCTYPE html>
<html>
<head>
 
<title>My E-commerce Website</title>

<style>

body{
font-family: Arial, sans-serif;
margin: 0;
padding: 0;
background-color: black;
}

.container{
display: grid;
grid-template-rows: auto auto 1fr auto;
grid-template-columns: 200px 1fr;

grid-template-areas:
"header header"
"sale sale"
"sidebar main"
"footer footer";

gap:10px;
padding:10px;
}

.header{
grid-area: header;
background-color: gray;
padding:10px;
text-align:center;
}

.sale{
grid-area: sale;
background-color: gray;
padding:10px;
text-align:center;
}

.sidebar{
grid-area: sidebar;
background-color: gray;
padding:10px;
}

.main{
grid-area: main;
background-color: gray;
padding:10px;

display:grid;
grid-template-columns: repeat(2,1fr);
gap:10px;
}

.footer{
grid-area: footer;
background-color: gray;
padding:10px;
text-align:center;
}

.product{
background-color: lightgray;
padding:10px;
border-radius:5px;
text-align:center;
}

.product-image{
width:200px;
height:200px;
}

.button{
background-color: grey;
color:black;
border:2px solid white;
padding:10px 20px;
border-radius:5px;
}

.button:hover{
background-color: lightslategray;
border:2px solid black;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>SPORTS ESSENTIALS</h1>
</div>

<div class="sale">
<p>Special Sale!</p>
</div>

<div class="sidebar">
<h2>Categories</h2>

<ul>
<li>Badminton</li>
<li>CRICKET</li>
<li>BASET BALL</li>
<li>tennis</li>
</ul>

</div>

<div class="main">

<div class="product">
<img class="product-image" src="bdm.jpg" alt="Badminton">
<h3>Badminton Racket</h3
<p>Price: $29.99</p>
<button class="button">Add to Cart</button>
</div>

<div class="product">
<img class="product-image" src="bat.webp" alt="cricket set">
<h3>CRICKET SET</h3>
<p>Price: $49.99</p>
<button class="button">Add to Cart</button>
</div>

<div class="product">
<img class="product-image" src="basketball.jpg" alt="basket ball">
<h3>Baket Ball</h3>
<p>Price: $19.99</p>
<button class="button">Add to Cart</button>
</div>

<div class="product">
<img class="product-image" src="tennis.jpg" alt="tennis">
<h3>tennis racket</h3>
<p>Price: $39.99</p>
<button class="button">Add to Cart</button>
</div>

</div>

<div class="footer">
<p>&copy; TOYS 4 TOYS Website. All rights reserved.</p>
</div>

</div>

</body>
</html>

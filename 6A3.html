<!DOCTYPE html>
<html>
<head>

<title>CLOTHINg</title>

<style>

body{
font-family: Arial, sans-serif;
margin: 0;
padding: 0;
background-color: black;
}

.container{
display: grid;
grid-template-rows: auto auto 1fr auto;
grid-template-columns: 200px 1fr;

grid-template-areas:
"header header"
"sale sale"
"sidebar main"
"footer footer";

gap:10px;
padding:10px;
}

.header{
grid-area: header;
background-color: gray;
padding:10px;
text-align:center;
}

.sale{
grid-area: sale;
background-color: gray;
padding:10px;
text-align:center;
}

.sidebar{
grid-area: sidebar;
background-color: gray;
padding:10px;
}

.main{
grid-area: main;
background-color: gray;
padding:10px;

display:grid;
grid-template-columns: repeat(2,1fr);
gap:10px;
}

.footer{
grid-area: footer;
background-color: gray;
padding:10px;
text-align:center;
}

.product{
background-color: lightgray;
padding:10px;
border-radius:5px;
text-align:center;
}

.product-image{
width:200px;
height:200px;
}

.button{
background-color: grey;
color:black;
border:2px solid white;
padding:10px 20px;
border-radius:5px;
}

.button:hover{
background-color: lightslategray;
border:2px solid black;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>FASHION</h1>
</div>

<div class="sale">
<p>Special Home Sale!</p>
</div>

<div class="sidebar">
<h2>Categories</h2>

<ul>
<li>SHIRTS</li>
<li>TSHIRTS</li>
<li>SHORTS</li>
<li>JEANS</li>
</ul>

</div>

<div class="main">

<div class="product">
<img class="product-image" src="SHIRT.jpg" alt="Bucket">
<h3>SHIRT</h3>
<p>Price: $9.99</p>
<button class="button">Add to Cart</button>
</div>

<div class="product">
<img class="product-image" src="TSHIRT.webp" alt="Mug">
<h3>TSHIRT</h3>
<p>Price: $5.99</p>
<button class="button">Add to Cart</button>
</div>

<div class="product">
<img class="product-image" src="SHORS.webp" alt="Container">
<h3>SHORTS</h3>
<p>Price: $12.99</p>
<button class="button">Add to Cart</button>
</div>

<div class="product">
<img class="product-image" src="JEAN.webp" alt="Broom">
<h3>JEAN</h3>
<p>Price: $7.99</p>
<button class="button">Add to Cart</button>
</div>

</div>

<div class="footer">
<p>&copy; HOME ESSENTIALS Website. All rights reserved.</p>
</div>

</div>

</body>
</html>
